<mat-toolbar>
  <a mat-button routerLink="/" aria-label="Go to home">
    <mat-icon aria-hidden="true" svgIcon="logo" class="!h-8 !w-8" />
    <span>Content Moderation Platform</span>
  </a>

  <span class="flex-1"></span>

  <nav class="flex gap-2" aria-label="Primary navigation">
    <a
      mat-stroked-button
      routerLink="/moderation-results"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon aria-hidden="true">fact_check</mat-icon>
      <span>Moderation Results</span>
    </a>
    <a
      mat-stroked-button
      routerLink="/upload"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon aria-hidden="true">cloud_upload</mat-icon>
      <span>Upload</span>
    </a>
  </nav>

  @if (isAuthenticated()) {
    @let profile = userProfile();
    <button
      [matMenuTriggerFor]="userMenu"
      class="ml-2 h-12 w-12 flex items-center justify-center overflow-hidden rounded-full border-0 bg-transparent p-0 cursor-pointer"
    >
      <span class="sr-only">User menu</span>
      @if (profile.avatarUrl; as url) {
        <img [src]="url" [alt]="profile.name" class="h-full w-full rounded-full object-cover" />
      } @else {
        <div
          class="flex h-full w-full items-center justify-center rounded-full bg-primary text-white text-sm font-medium"
        >
          {{ profile.initials }}
        </div>
      }
    </button>

    <mat-menu #userMenu="matMenu" class="user-menu-panel">
      <div class="flex items-center gap-1 px-4 py-2">
        @if (profile.avatarUrl; as url) {
          <img [src]="url" [alt]="profile.name" class="!h-12 !w-12 rounded-full object-cover" />
        } @else {
          <div
            class="flex !h-12 !w-12 items-center justify-center rounded-full bg-primary text-white text-sm font-medium"
          >
            {{ profile.initials }}
          </div>
        }
        <div class="flex flex-col leading-tight">
          <span class="text-sm font-semibold text-gray-900">{{ profile.name }}</span>
          @if (profile.email; as mail) {
            <span class="text-sm font-medium text-gray-600">{{ mail }}</span>
          }
        </div>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()">
        <mat-icon class="!text-red-600">logout</mat-icon>
        <span class="text-red-600">Logout</span>
      </button>
    </mat-menu>
  }
</mat-toolbar>
