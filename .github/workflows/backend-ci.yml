name: Backend CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Quality Checks
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.22"
          enable-cache: true
          cache-dependency-glob: |
            backend/requirements-ci-quality.txt
            backend/requirements-ci-tests.txt

      - name: Install dependencies
        run: uv pip install --system -r backend/requirements-ci-quality.txt

      - name: Run ruff lint checks
        run: ruff check backend/lambdas backend/tests backend/scripts backend/layers/serverless-utils-layer/python/common

      - name: Run black formatting checks
        env:
          BLACK_LINE_LENGTH: "100"
        run: |
          black \
            --check \
            --line-length="${BLACK_LINE_LENGTH}" \
            backend/lambdas backend/tests backend/scripts \
            backend/layers/serverless-utils-layer/python/common

      - name: Run flake8 lint checks
        env:
          FLAKE8_MAX_LINE_LENGTH: "100"
        run: |
          flake8 \
            --max-line-length="${FLAKE8_MAX_LINE_LENGTH}" \
            backend/lambdas backend/tests backend/scripts \
            backend/layers/serverless-utils-layer/python/common

      - name: Run pyright type checks
        run: pyright --project pyrightconfig.json

  backend-security:
    name: Security Checks
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.22"
          enable-cache: true
          cache-dependency-glob: |
            backend/requirements-ci-security.txt
            backend/requirements-ci-tests.txt

      - name: Install dependencies
        run: uv pip install --system -r backend/requirements-ci-security.txt

      - name: Run dependency vulnerability scan
        run: pip-audit -r backend/requirements-ci-tests.txt

      - name: Run static security scan
        run: |
          bandit -q -r \
            backend/lambdas \
            backend/scripts \
            backend/layers/serverless-utils-layer/python/common

  backend-unit-tests:
    name: Unit Tests
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.22"
          enable-cache: true
          cache-dependency-glob: backend/requirements-ci-tests.txt

      - name: Install dependencies
        run: uv pip install --system -r backend/requirements-ci-tests.txt

      - name: Run backend unit tests
        run: python backend/tests/suite_unit.py

  backend-integration-tests:
    name: Integration Tests
    runs-on: ubuntu-24.04-arm
    needs: [backend-quality, backend-security, backend-unit-tests]
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.22"
          enable-cache: true
          cache-dependency-glob: backend/requirements-ci-tests.txt

      - name: Install dependencies
        run: uv pip install --system -r backend/requirements-ci-tests.txt

      - name: Run backend integration tests
        run: python backend/tests/suite_integration.py
