name: Backend CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Quality Checks
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.22"
          enable-cache: true
          cache-dependency-glob: |
            backend/requirements-ci-quality.txt
            backend/requirements-ci-tests.txt

      - name: Install dependencies
        run: |
          uv pip install --system \
            -r backend/requirements-ci-quality.txt \
            -r backend/requirements-ci-tests.txt

      - name: Run ruff lint checks
        run: ruff check backend/lambdas backend/tests backend/scripts backend/layers/serverless-utils-layer/python/common

      - name: Run black formatting checks
        env:
          BLACK_LINE_LENGTH: "100"
        run: |
          black \
            --check \
            --line-length="${BLACK_LINE_LENGTH}" \
            backend/lambdas backend/tests backend/scripts \
            backend/layers/serverless-utils-layer/python/common

      - name: Run flake8 lint checks
        env:
          FLAKE8_MAX_LINE_LENGTH: "100"
        run: |
          flake8 \
            --max-line-length="${FLAKE8_MAX_LINE_LENGTH}" \
            backend/lambdas backend/tests backend/scripts \
            backend/layers/serverless-utils-layer/python/common

      - name: Run pyright type checks
        run: pyright --project pyrightconfig.json

  backend-security:
    name: Security Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.22"
          enable-cache: true
          cache-dependency-glob: |
            backend/requirements-ci-security.txt
            backend/requirements-ci-tests.txt

      - name: Install dependencies
        run: uv pip install --system -r backend/requirements-ci-security.txt

      - name: Run dependency vulnerability scan
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=backend/requirements-ci-tests.txt

      - name: Run static security scan
        run: |
          bandit -q -r \
            backend/lambdas \
            backend/scripts \
            backend/layers/serverless-utils-layer/python/common

  backend-unit-tests:
    name: Unit Tests
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.22"
          enable-cache: true
          cache-dependency-glob: backend/requirements-ci-tests.txt

      - name: Install dependencies
        run: uv pip install --system -r backend/requirements-ci-tests.txt

      - name: Run backend unit tests
        run: |
          pytest \
            --override-ini="addopts=-ra --strict-config" \
            backend/tests/events \
            backend/tests/lambdas/content-moderation-api \
            backend/tests/lambdas/content-moderation-orchestrator \
            backend/tests/lambdas/content-moderation-dlq-handler \
            --junitxml=backend/test-reports/unit/junit.xml

      - name: Publish unit test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Backend Unit Tests
          path: backend/test-reports/unit/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload unit test XML on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-unit-test-report-failed-${{ github.run_attempt }}
          path: backend/test-reports/unit/*.xml
          if-no-files-found: warn
          retention-days: 7

  backend-integration-tests:
    name: Integration Tests
    runs-on: ubuntu-24.04-arm
    needs: [backend-quality, backend-security, backend-unit-tests]
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.22"
          enable-cache: true
          cache-dependency-glob: backend/requirements-ci-tests.txt

      - name: Install dependencies
        run: uv pip install --system -r backend/requirements-ci-tests.txt

      - name: Run backend integration tests
        run: pytest --override-ini="addopts=-ra --strict-config" backend/tests/integration --junitxml=backend/test-reports/integration/junit.xml

      - name: Publish integration test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Backend Integration Tests
          path: backend/test-reports/integration/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload integration test XML on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-integration-test-report-failed-${{ github.run_attempt }}
          path: backend/test-reports/integration/*.xml
          if-no-files-found: warn
          retention-days: 7
