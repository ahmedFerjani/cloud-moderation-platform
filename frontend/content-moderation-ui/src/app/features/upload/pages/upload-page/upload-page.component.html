<section class="mx-auto grid max-w-3xl gap-5">
  <header class="grid gap-1.5">
    <h2 class="m-0 text-2xl font-semibold tracking-tight">Image Intake</h2>
    <p class="m-0 text-sm text-[var(--mat-sys-on-surface-variant)]">
      Submit one image for automated moderation checks.
    </p>
  </header>

  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title class="m-0">Submit for Moderation</mat-card-title>
      <mat-card-subtitle id="upload-accepted-format" class="m-0">
        Accepted formats: JPG, PNG (max 10 MB)
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="grid gap-4 pt-2">
      <app-upload-picker
        class="block"
        describedBy="upload-accepted-format"
        [disabled]="isUploading()"
        (fileSelected)="setSelectedFile($event)"
      ></app-upload-picker>

      @if (selectedFileName(); as fileName) {
        <app-selected-file-preview
          [fileName]="fileName"
          [sizeLabel]="selectedFileSizeLabel()"
          [previewUrl]="selectedFilePreviewUrl()"
          (removeRequested)="setSelectedFile(null)"
        ></app-selected-file-preview>
      } @else {
        <p class="m-0 text-sm text-[var(--mat-sys-on-surface-variant)]" aria-live="polite">
          No image selected yet.
        </p>
      }

      <app-upload-feedback [uploadState]="uploadState()"></app-upload-feedback>
    </mat-card-content>

    <mat-card-actions class="justify-center px-4 pb-4">
      <button
        mat-flat-button
        type="button"
        [disabled]="!selectedFileName() || isUploading()"
        (click)="onUpload()"
      >
        Upload for Review
      </button>
    </mat-card-actions>
  </mat-card>
</section>
