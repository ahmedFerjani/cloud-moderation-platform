AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Cloud-native image moderation platform built with AWS Lambda, Rekognition, Textract, Comprehend, SQS, SNS, DynamoDB, and API Gateway

Globals:
  Function:
    Runtime: python3.14
    Timeout: 30
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        CAPTURE_SAMPLE_EVENTS: "false"

Parameters:
  TableName:
    Type: String
    Description: DynamoDB table name used to store moderation results
  BucketName:
    Type: String
    Description: S3 bucket name used for image uploads
  SnsSuccessTopicArn:
    Type: String
    Description: SNS topic ARN for successful moderation notifications
  SnsDlqTopicArn:
    Type: String
    Description: SNS topic ARN for failed moderation notifications

Resources:
  ServerlessUtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: content-moderation-serverless-utils
      Description: Shared utilities layer for logging, middleware, and responses
      ContentUri: layers/serverless-utils-layer/
      CompatibleRuntimes:
        - python3.14
      RetentionPolicy: Delete

  ImageProcessingLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: content-moderation-image-processing
      Description: Image processing dependencies (Pillow)
      ContentUri: layers/image-processing-layer/
      CompatibleRuntimes:
        - python3.14
      RetentionPolicy: Delete

  ContentModerationApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: content-moderation-api-local
      CodeUri: lambdas/content-moderation-api/
      Handler: handler.lambda_handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Sid: S3PresignedUpload
              Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub arn:aws:s3:::${BucketName}/uploads/*
            - Sid: ReadModerationResults
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Scan
              Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}
      Layers:
        - !Ref ServerlessUtilsLayer
      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
          TABLE_NAME: !Ref TableName
      Events:
        GenerateUploadUrl:
          Type: HttpApi
          Properties:
            Path: /generate-upload-url
            Method: post

        GetModerationResults:
          Type: HttpApi
          Properties:
            Path: /moderation-results
            Method: get

        GetModerationResult:
          Type: HttpApi
          Properties:
            Path: /moderation-results/{imageId}
            Method: get

  ContentModerationOrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: content-moderation-orchestrator-local
      CodeUri: lambdas/content-moderation-orchestrator/
      Handler: handler.lambda_handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Sid: ReadUploadedImages
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub arn:aws:s3:::${BucketName}/uploads/*
            - Sid: DetectModerationLabels
              Effect: Allow
              Action:
                - rekognition:DetectModerationLabels
              Resource: "*"
            - Sid: StoreAndLookupModerationResults
              Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}/index/image_hash
            - Sid: PublishSuccessNotification
              Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref SnsSuccessTopicArn
      Layers:
        - !Ref ServerlessUtilsLayer
        - !Ref ImageProcessingLayer
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          SNS_SUCCESS_TOPIC_ARN: !Ref SnsSuccessTopicArn

  ContentModerationDlqHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: content-moderation-dlq-handler-local
      CodeUri: lambdas/content-moderation-dlq-handler/
      Handler: handler.lambda_handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Sid: StoreFailureResult
              Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}
            - Sid: PublishFailureNotification
              Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref SnsDlqTopicArn
      Layers:
        - !Ref ServerlessUtilsLayer
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          SNS_TOPIC_ARN: !Ref SnsDlqTopicArn

Outputs:
  LocalApiBaseUrl:
    Description: Base URL when running sam local start-api on port 3000
    Value: http://127.0.0.1:3000
