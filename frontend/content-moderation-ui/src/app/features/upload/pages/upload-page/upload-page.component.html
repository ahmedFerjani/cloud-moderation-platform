<section class="upload-page">
  <header class="upload-page__header">
    <h2>Image Intake</h2>
    <p>Submit one image for automated moderation checks.</p>
  </header>

  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>Submit for Moderation</mat-card-title>
      <mat-card-subtitle id="upload-accepted-format">
        Accepted formats: JPG, PNG (max 10 MB)
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="upload-card__content">
      <app-upload-picker
        describedBy="upload-accepted-format"
        [disabled]="isUploading()"
        (fileSelected)="setSelectedFile($event)"
      ></app-upload-picker>

      @if (selectedFileName(); as fileName) {
        <app-selected-file-preview
          [fileName]="fileName"
          [sizeLabel]="selectedFileSizeLabel()"
          [previewUrl]="selectedFilePreviewUrl()"
          (removeRequested)="setSelectedFile(null)"
        ></app-selected-file-preview>
      } @else {
        <p class="upload-hint" aria-live="polite">No image selected yet.</p>
      }

      <app-upload-feedback [uploadState]="uploadState()"></app-upload-feedback>
    </mat-card-content>

    <mat-card-actions>
      <button
        mat-flat-button
        type="button"
        [disabled]="!selectedFileName() || isUploading()"
        (click)="onUpload()"
      >
        Upload for Review
      </button>
    </mat-card-actions>
  </mat-card>
</section>
