name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

jobs:
  frontend-code-quality:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: frontend/content-moderation-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/content-moderation-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run prettier:check

      - name: Lint frontend
        run: npm run lint:ci

      - name: Type check frontend
        run: npm run typecheck

  frontend-build:
    runs-on: ubuntu-22.04
    needs: frontend-code-quality

    defaults:
      run:
        working-directory: frontend/content-moderation-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/content-moderation-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  frontend-tests:
    runs-on: ubuntu-22.04
    needs: frontend-code-quality

    defaults:
      run:
        working-directory: frontend/content-moderation-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/content-moderation-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:ci

  frontend-security-scan:
    runs-on: ubuntu-22.04
    needs: frontend-code-quality

    defaults:
      run:
        working-directory: frontend/content-moderation-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/content-moderation-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
