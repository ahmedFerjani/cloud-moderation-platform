<input
  #fileInput
  type="file"
  [accept]="acceptedFormats()"
  [multiple]="true"
  hidden
  (change)="onFileInputChange($event)"
/>

<button
  class="upload-picker grid min-h-44 w-full justify-items-center gap-1.5 p-4 text-center"
  [class.upload-picker--active]="isDragActive()"
  mat-stroked-button
  type="button"
  [attr.aria-describedby]="describedBy()"
  [disabled]="disabled()"
  (click)="fileInput.click()"
  (dragover)="onPickerDragOver($event)"
  (dragleave)="onPickerDragLeave($event)"
  (drop)="onPickerDrop($event)"
>
  <mat-icon aria-hidden="true" class="h-8 w-8 text-[2rem]">add_photo_alternate</mat-icon>
  <span class="grid justify-items-center gap-1">
    <span>Drag and drop images here</span>
    <span>or click to browse up to {{ maxFiles() }} files</span>
  </span>
</button>
